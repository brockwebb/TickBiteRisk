name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run Python lint
        run: ruff check .

      - name: Run Python tests
        run: pytest -q

      - name: Check dashboard JavaScript syntax
        run: node --check public/app.js

      - name: Validate committed dashboard data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("public/data")
          expected_files = [
              "md_counties.geojson",
              "md_county_metadata.json",
              "md_county_risk_weekly.json",
              "model_card.json",
              "source_catalog.json",
              "static_export_manifest.json",
          ]

          for filename in expected_files:
              path = data_dir / filename
              if not path.is_file():
                  raise SystemExit(f"Missing dashboard data asset: {path}")
              with path.open(encoding="utf-8") as handle:
                  parsed = json.load(handle)
              if filename.endswith(".geojson") and parsed.get("type") != "FeatureCollection":
                  raise SystemExit(f"Expected GeoJSON FeatureCollection: {path}")
          PY

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Install dashboard smoke dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Python lint
        run: ruff check .

      - name: Run Python tests
        run: pytest -q

      - name: Check dashboard JavaScript syntax
        run: |
          node --check public/app.js
          node --check public/regional-research.js

      - name: Run dashboard browser smoke
        run: npm run test:dashboard

      - name: Validate committed dashboard data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("public/data")
          expected_files = [
              "md_counties.geojson",
              "md_county_metadata.json",
              "md_county_risk_weekly.json",
              "model_card.json",
              "source_catalog.json",
              "static_export_manifest.json",
          ]

          for filename in expected_files:
              path = data_dir / filename
              if not path.is_file():
                  raise SystemExit(f"Missing dashboard data asset: {path}")
              with path.open(encoding="utf-8") as handle:
                  parsed = json.load(handle)
              if filename.endswith(".geojson") and parsed.get("type") != "FeatureCollection":
                  raise SystemExit(f"Expected GeoJSON FeatureCollection: {path}")
          PY

      - name: Validate regional research preview data
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          data_dir = Path("public/research-data/regional")
          expected_files = [
              "model_card.json",
              "regional_counties.geojson",
              "regional_county_incidence_annual.json",
              "regional_states.geojson",
              "regional_county_metadata.json",
              "regional_county_risk_weekly.json",
              "regional_spatial_regime_overlays.json",
              "source_catalog.json",
              "static_export_manifest.json",
          ]
          expected_research_status = {
              "not_public_maryland_default": True,
              "research_only": True,
          }

          present = sorted(
              path.relative_to(data_dir).as_posix()
              for path in data_dir.rglob("*")
              if path.is_file()
          )
          if present != sorted(expected_files):
              raise SystemExit(
                  f"Unexpected regional research data files: {present}; expected {expected_files}"
              )

          def load_json(filename):
              path = data_dir / filename
              with path.open(encoding="utf-8") as handle:
                  return json.load(handle)

          model_card = load_json("model_card.json")
          weekly = load_json("regional_county_risk_weekly.json")
          metadata = load_json("regional_county_metadata.json")
          geojson = load_json("regional_counties.geojson")
          annual = load_json("regional_county_incidence_annual.json")
          states = load_json("regional_states.geojson")
          overlays = load_json("regional_spatial_regime_overlays.json")
          source_catalog = load_json("source_catalog.json")
          manifest = load_json("static_export_manifest.json")
          regional_payloads = {
              "model_card.json": model_card,
              "regional_county_metadata.json": metadata,
              "regional_county_incidence_annual.json": annual,
              "regional_county_risk_weekly.json": weekly,
              "regional_spatial_regime_overlays.json": overlays,
              "source_catalog.json": source_catalog,
              "static_export_manifest.json": manifest,
          }

          weekly_counties = {record["county_fips"] for record in weekly["records"]}
          metadata_counties = {county["county_fips"] for county in metadata["counties"]}
          geojson_counties = {
              feature["properties"]["county_fips"] for feature in geojson["features"]
          }
          week_counts = Counter(
              (record["county_fips"], record["year"]) for record in weekly["records"]
          )

          for filename, payload in regional_payloads.items():
              if payload["research_status"] != expected_research_status:
                  raise SystemExit(f"{filename} must remain research-only.")
          if weekly["record_count"] != len(weekly["records"]):
              raise SystemExit("Regional weekly risk record_count does not match records.")
          if len(weekly_counties) != 283:
              raise SystemExit(f"Expected 283 regional counties, found {len(weekly_counties)}.")
          if weekly_counties != metadata_counties or weekly_counties != geojson_counties:
              raise SystemExit("Regional county FIPS mismatch across weekly, metadata, and GeoJSON assets.")
          if weekly.get("year_selection") != "all_available_years":
              raise SystemExit("Regional preview must preserve all forecast years.")
          if {record["year"] for record in weekly["records"]} != {2024, 2025, 2026}:
              raise SystemExit("Regional preview must contain forecast years 2024, 2025, and 2026.")
          if {record["data_year"] for record in weekly["records"]} != {2024, 2025, 2026}:
              raise SystemExit("Regional preview data_year values must match forecast years.")
          if weekly["selected_forecast_metadata"].get("forecast_years") != [2024, 2025, 2026]:
              raise SystemExit("Regional forecast metadata must advertise the forecast-year set.")
          if len(weekly["selected_forecast_metadata"].get("source_prediction_run_ids", [])) != 3:
              raise SystemExit("Regional forecast metadata must retain all source prediction run IDs.")
          if weekly["record_count"] != 283 * 53 * 3:
              raise SystemExit("Regional preview must include 283 counties x 53 weeks x 3 forecast years.")
          if set(week_counts.values()) != {53}:
              raise SystemExit("Each regional county-year must have 53 weekly forecast rows.")
          if {record["mmwr_week"] for record in weekly["records"]} != set(range(1, 54)):
              raise SystemExit("Regional preview must cover MMWR weeks 1-53.")
          if not all(1 <= record["risk_score"] <= 10 for record in weekly["records"]):
              raise SystemExit("Regional risk_score values must stay on the 1-10 scale.")
          allowed_categories = {"very_low", "low", "moderate", "high", "very_high"}
          if not all(record["risk_category"] in allowed_categories for record in weekly["records"]):
              raise SystemExit("Regional risk_category contains an unexpected value.")

          if geojson.get("type") != "FeatureCollection":
              raise SystemExit("Regional counties GeoJSON must be a FeatureCollection.")
          if geojson["metadata"]["web_map_simplified"] is not True:
              raise SystemExit("Regional counties GeoJSON must be simplified for web preview.")
          if geojson["metadata"]["feature_count"] != 283 or len(geojson["features"]) != 283:
              raise SystemExit("Regional counties GeoJSON must contain 283 county features.")
          if states["metadata"]["scope"] != "midatlantic_state_boundary":
              raise SystemExit("Regional states GeoJSON must be state-boundary geometry.")
          if states["metadata"]["web_map_simplified"] is not True:
              raise SystemExit("Regional states GeoJSON must be simplified for web preview.")
          if states["metadata"]["feature_count"] != 6 or len(states["features"]) != 6:
              raise SystemExit("Regional states GeoJSON must contain 6 state features.")
          if {
              feature["properties"]["state_abbr"] for feature in states["features"]
          } != {"DE", "DC", "MD", "PA", "VA", "WV"}:
              raise SystemExit("Regional states GeoJSON must cover DE/DC/MD/PA/VA/WV.")
          if annual["data_role"] != "observed_historical":
              raise SystemExit("Regional annual incidence data must be historical observed data.")
          if annual["record_count"] != len(annual["records"]):
              raise SystemExit("Regional annual incidence record_count does not match records.")
          if annual["year_range"] != [2001, 2024]:
              raise SystemExit("Regional annual incidence must cover observed years 2001-2024.")
          if sum(1 for record in annual["records"] if record["year"] == 2024) != 67:
              raise SystemExit("Regional 2024 observed incidence must remain the partial PA overlay.")
          if {
              record["state_abbr"] for record in annual["records"] if record["year"] == 2024
          } != {"PA"}:
              raise SystemExit("Regional 2024 observed incidence must be labeled as PA-only.")
          if len({record["county_fips"] for record in annual["records"]}) != 283:
              raise SystemExit("Regional annual incidence must include 283 counties.")
          expected_annual_fields = {
              "county_fips",
              "county_name",
              "data_role",
              "diagnostic_midatlantic_incidence_percentile",
              "diagnostic_midatlantic_incidence_rank",
              "diagnostic_midatlantic_incidence_tier",
              "feature_quality_flags",
              "incidence_per_100k",
              "population",
              "reported_cases",
              "state_abbr",
              "state_fips",
              "state_name",
              "year",
          }
          if set(annual["records"][0]) != expected_annual_fields:
              raise SystemExit("Regional annual incidence records expose unexpected fields.")
          if {record["data_role"] for record in annual["records"]} != {"observed_historical"}:
              raise SystemExit("Regional annual incidence records must be observed historical rows.")
          if any("total_cases" in record for record in annual["records"]):
              raise SystemExit("Regional annual incidence must expose reported_cases, not total_cases.")
          if any("lyme_panel_sha256" in record for record in annual["records"]):
              raise SystemExit("Regional annual incidence must not repeat raw panel hashes per record.")
          if any("population_panel_sha256" in record for record in annual["records"]):
              raise SystemExit("Regional annual incidence must not repeat raw panel hashes per record.")
          if not all(
              "reported_cases_not_stable_true_incidence" in record["feature_quality_flags"]
              for record in annual["records"]
          ):
              raise SystemExit("Regional annual incidence must retain surveillance caveat flags.")
          if "reported cases are not stable true incidence" not in " ".join(
              annual["caveats"]
          ).lower():
              raise SystemExit("Regional annual incidence must explain reported-case caveats.")
          if not any(
              source.get("source_id") == "regional_observed_annual_incidence"
              for source in source_catalog["sources"]
          ):
              raise SystemExit("Regional source catalog must include the observed annual incidence layer.")

          if metadata["county_count"] != 283 or not all(
              county.get("selected_spatial_regime") for county in metadata["counties"]
          ):
              raise SystemExit("Regional county metadata must include selected spatial regimes.")
          if not all(
              county.get("available_years") == [2024, 2025, 2026]
              for county in metadata["counties"]
          ):
              raise SystemExit("Regional county metadata must expose 2024-2026 forecast years.")
          if overlays["record_count"] != len(overlays["records"]):
              raise SystemExit("Regional spatial overlay record_count does not match records.")
          if manifest["record_counts"]["weekly_risk"] != weekly["record_count"]:
              raise SystemExit("Regional manifest weekly_risk count does not match payload.")
          if sorted(manifest["files"]) != sorted(expected_files):
              raise SystemExit("Regional manifest file list does not match committed assets.")

          for source in source_catalog["sources"]:
              if source.get("redistribution") != "public derived data":
                  raise SystemExit("Regional source catalog must label redistribution boundaries.")
              if not source.get("source_id") or not source.get("notes"):
                  raise SystemExit("Regional source catalog must include source IDs and caveats.")
          PY

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
